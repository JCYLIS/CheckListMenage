<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ménage - Checklist</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    .header { padding: 28px 24px 12px; }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-top: 6px;
      font-weight: 500;
    }

    .progress-track {
      margin: 8px 24px 20px;
      height: 6px;
      border-radius: 3px;
      background: #f1f5f9;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
    }

    .progress-fill.done {
      background: linear-gradient(90deg, #4ade80, #22c55e);
    }

    .task-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #e8ecf1;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #fff;
      user-select: none;
      animation: fadeSlideIn 0.4s ease both;
    }

    .task-row:active { transform: scale(0.98); }

    .task-row.checked {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .task-icon { font-size: 20px; line-height: 1; flex-shrink: 0; }

    .task-label {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      color: #1e293b;
      line-height: 1.3;
      transition: all 0.2s ease;
    }

    .task-row.checked .task-label {
      text-decoration: line-through;
      color: #86a896;
    }

    .checkbox {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
      background: #fff;
    }

    .task-row.checked .checkbox {
      background: #22c55e;
      border-color: #22c55e;
    }

    .checkmark { display: none; }
    .task-row.checked .checkmark { display: block; }

    .footer {
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .reset-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      background: #f8fafc;
      color: #94a3b8;
      transition: all 0.2s ease;
    }

    .reset-btn.confirm {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca;
    }

    .saved-at {
      font-size: 12px;
      color: #94a3b8;
    }

    .status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      margin-top: 4px;
    }

    .status.offline {
      background: #fef3c7;
      color: #92400e;
    }

    .status.online {
      background: #ecfdf5;
      color: #065f46;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
    }

    .loading-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #3b82f6;
      animation: pulse 1s infinite;
    }

    .loading p { color: #8a9bae; }

    .setup-msg {
      padding: 40px 24px;
      text-align: center;
      color: #dc2626;
      font-size: 14px;
      line-height: 1.6;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="card" id="app">
  <div class="loading">
    <div class="loading-dot"></div>
    <p>Chargement...</p>
  </div>
</div>

<script type="module">
  // =============================================
  // CONFIGURATION FIREBASE
  // Remplace les valeurs ci-dessous par les tiennes
  // (Firebase Console > Paramètres du projet > Config)
  // =============================================
  const firebaseConfig = {
    apiKey: "AIzaSyCdmFVTsHWsKz_os4aUbCsFvi_1gKWmrDs",
    authDomain: "checklist-menage.firebaseapp.com",
    databaseURL: "https://checklist-menage-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "checklist-menage",
    storageBucket: "checklist-menage.firebasestorage.app",
    messagingSenderId: "799371763363",
    appId: "1:799371763363:web:7713ecbbcb4104717de916"
  };
  // =============================================

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const TASKS = [
    { id: "frigo", label: "Nettoyer le frigo", icon: "🧊" },
    { id: "carreaux", label: "Faire les carreaux", icon: "🪟" },
    { id: "repassage", label: "Repassage", icon: "👔" },
    { id: "four", label: "Nettoyer le four", icon: "🔥" },
    { id: "portes", label: "Nettoyer les portes", icon: "🚪" },
    { id: "tiroirs", label: "Nettoyer les tiroirs cuisine et façades", icon: "🗄️" },
  ];

  const app = document.getElementById("app");

  // Config OK

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getDatabase(firebaseApp);
  const checklistRef = ref(db, "checklist");

  let state = {};
  let resetConfirm = false;
  let resetTimeout = null;

  function render() {
    const doneCount = TASKS.filter(t => state[t.id]).length;
    const progress = (doneCount / TASKS.length) * 100;
    const allDone = doneCount === TASKS.length;

    app.innerHTML = `
      <div class="header">
        <div class="title">Ménage</div>
        <div class="subtitle">${allDone ? "Tout est fait — merci ! ✨" : `${doneCount} / ${TASKS.length} tâches`}</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill ${allDone ? 'done' : ''}" style="width: ${progress}%"></div>
      </div>
      <div class="task-list">
        ${TASKS.map((t, i) => `
          <div class="task-row ${state[t.id] ? 'checked' : ''}" data-id="${t.id}" style="animation-delay: ${i * 60}ms">
            <span class="task-icon">${t.icon}</span>
            <span class="task-label">${t.label}</span>
            <span class="checkbox">
              <svg class="checkmark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </div>
        `).join('')}
      </div>
      <div class="footer">
        <button class="reset-btn ${resetConfirm ? 'confirm' : ''}" id="resetBtn">
          ${resetConfirm ? "Confirmer le reset ?" : "Tout décocher"}
        </button>
        ${state._savedAt ? `<div class="saved-at">Mis à jour : ${state._savedAt}</div>` : ''}
      </div>
    `;

    // Event listeners
    document.querySelectorAll('.task-row').forEach(row => {
      row.addEventListener('click', () => toggle(row.dataset.id));
    });

    document.getElementById('resetBtn').addEventListener('click', handleReset);
  }

  function toggle(id) {
    state[id] = !state[id];
    save();
  }

  function handleReset() {
    if (!resetConfirm) {
      resetConfirm = true;
      render();
      resetTimeout = setTimeout(() => { resetConfirm = false; render(); }, 3000);
      return;
    }
    clearTimeout(resetTimeout);
    resetConfirm = false;
    TASKS.forEach(t => { state[t.id] = false; });
    save();
  }

  function save() {
    const now = new Date().toLocaleString("fr-FR", {
      day: "2-digit", month: "2-digit", year: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
    state._savedAt = now;
    set(checklistRef, state);
  }

  // Listen for realtime updates
  onValue(checklistRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      state = data;
    } else {
      state = {};
    }
    render();
  });

</script>
</body>
</html>
